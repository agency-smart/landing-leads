      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');

    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};

      const entry = manifest[uuid];

            const reader = ds.readable.getReader();

              const { done, value } = await reader.read();

              chunks.push(value);
              totalLen += value.length;

            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

      } catch (err) {

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);

      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);

      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;

      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {

        s.textContent = await r.text();
        s.removeAttribute('src');

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

color:rgba(255,255,255,0.18);\">Tu información es confidencial y nunca será compartida con terceros.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ══════════ NO CALIFICA ══════════ -->\n<sc-if value=\"{{ isRejected }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"min-height:100vh; background:#080808; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:48px; animation:fadeIn 0.35s ease;\">\n  <img src=\"0fd8963c-4f86-4a14-96dc-3a2f1b332856\" alt=\"Agency Smart\" style=\"height:32px; width:auto; margin-bottom:52px; opacity:0.4;\">\n  <div style=\"max-width:460px; text-align:center;\">\n    <div style=\"width:60px; height:60px; border-radius:50%; border:1px solid rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center; margin:0 auto 28px;\">\n      <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M12 8v4m0 4h.01\" stroke=\"rgba(255,255,255,0.4)\" stroke-width=\"1.8\" stroke-linecap=\"round\"><\u002Fpath><circle cx=\"12\" cy=\"12\" r=\"9\" stroke=\"rgba(255,255,255,0.15)\" stroke-width=\"1.5\"><\u002Fcircle><\u002Fsvg>\n    <\u002Fdiv>\n    <h2 style=\"font-size:28px; font-weight:700; margin-bottom:14px; line-height:1.2;\">Gracias por tu interés.<\u002Fh2>\n    <p style=\"font-size:15px; color:rgba(255,255,255,0.45); line-height:1.8; margin-bottom:40px;\">Nuestros servicios están diseñados para negocios con una inversión mínima establecida en publicidad. Cuando estés listo para dar el siguiente paso, estaremos aquí.<\u002Fp>\n    <div style=\"display:flex; gap:12px; justify-content:center; flex-wrap:wrap;\">\n      <a href=\"https://instagram.com/agencysmart_mx\" target=\"_blank\" style=\"display:inline-flex; align-items:center; gap:8px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:rgba(255,255,255,0.65); border-radius:5px; padding:12px 20px; font-size:13px; font-weight:500; font-family:-apple-system,'SF Pro Display',BlinkMacSystemFont,'Helvetica Neue',sans-serif;\">Seguir en Instagram<\u002Fa>\n      <a href=\"Agency Smart Landing.dc.html\" style=\"display:inline-flex; align-items:center; gap:8px; background:none; border:1px solid rgba(255,255,255,0.08); color:rgba(255,255,255,0.3); border-radius:5px; padding:12px 20px; font-size:13px; font-weight:500; font-family:-apple-system,'SF Pro Display',BlinkMacSystemFont,'Helvetica Neue',sans-serif;\">Volver al inicio<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ══════════ GRACIAS ══════════ -->\n<sc-if value=\"{{ isThanks }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"min-height:100vh; background:#080808; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:48px; animation:scaleIn 0.4s ease;\">\n  <img src=\"0fd8963c-4f86-4a14-96dc-3a2f1b332856\" alt=\"Agency Smart\" style=\"height:32px; width:auto; margin-bottom:52px;\">\n  <div style=\"max-width:500px; text-align:center;\">\n    <div style=\"width:64px; height:64px; border-radius:50%; background:rgba(22,200,90,0.1); border:1px solid rgba(22,200,90,0.2); display:flex; align-items:center; justify-content:center; margin:0 auto 30px;\">\n      <svg width=\"28\" height=\"28\" viewBox=\"0 0 28 28\" fill=\"none\"><path d=\"M5 14l7 7 11-11\" stroke=\"#16C85A\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n    <\u002Fdiv>\n    <h2 style=\"font-size:30px; font-weight:700; margin-bottom:14px; letter-spacing:-0.02em;\">¡Información recibida!<\u002Fh2>\n    <p style=\"font-size:15px; color:rgba(255,255,255,0.45); line-height:1.8; margin-bottom:40px;\">Nuestro equipo revisará tu información y se pondrá en contacto en las próximas <strong style=\"color:rgba(255,255,255,0.8);\">24 horas hábiles<\u002Fstrong> con tu diagnóstico personalizado.<\u002Fp>\n    <div style=\"background:rgba(255,255,255,0.025); border:1px solid rgba(255,255,255,0.07); border-radius:8px; padding:28px; margin-bottom:36px; text-align:left;\">\n      <p style=\"font-size:10px; font-weight:700; color:rgba(255,255,255,0.28); letter-spacing:0.14em; text-transform:uppercase; margin-bottom:18px;\">Próximos pasos<\u002Fp>\n      <div style=\"display:flex; flex-direction:column; gap:14px;\">\n        <div style=\"display:flex; gap:12px; align-items:flex-start;\">\n          <div style=\"min-width:26px; height:26px; border-radius:50%; background:#0066CC; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0;\">1<\u002Fdiv>\n          <p style=\"font-size:13px; color:rgba(255,255,255,0.5); padding-top:4px; line-height:1.5;\">Revisamos tu perfil y objetivos de negocio.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:12px; align-items:flex-start;\">\n          <div style=\"min-width:26px; height:26px; border-radius:50%; background:rgba(255,255,255,0.08); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0;\">2<\u002Fdiv>\n          <p style=\"font-size:13px; color:rgba(255,255,255,0.5); padding-top:4px; line-height:1.5;\">Un estratega te contacta por WhatsApp o email.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:12px; align-items:flex-start;\">\n          <div style=\"min-width:26px; height:26px; border-radius:50%; background:rgba(255,255,255,0.08); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0;\">3<\u002Fdiv>\n          <p style=\"font-size:13px; color:rgba(255,255,255,0.5); padding-top:4px; line-height:1.5;\">Diagnóstico gratuito de 30 min y propuesta a medida.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <a href=\"Agency Smart Landing.dc.html\" style=\"font-size:13px; color:rgba(255,255,255,0.25);\" style-hover=\"color:rgba(255,255,255,0.6)\">Volver al inicio<\u002Fa>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    screen: 'q1',\n    answers: {},\n    form: { name: '', email: '', phone: '', city: '', business: '', industry: '', budget: '' },\n    formError: ''\n  }\n\n  _makeOptions(items, key, nextScreen, isGrid) {\n    return items.map(opt => {\n      const sel = this.state.answers[key] === opt.value;\n      return {\n        label: opt.label,\n        containerStyle: {\n          padding: isGrid ? '14px 16px' : '15px 20px',\n          border: sel ? '1px solid #0066CC' : '1px solid rgba(255,255,255,0.09)',\n          background: sel ? 'rgba(0,102,204,0.1)' : 'rgba(255,255,255,0.02)',\n          borderRadius: '7px', cursor: 'pointer',\n          display: 'flex', alignItems: 'center', gap: '12px',\n          userSelect: 'none', transition: 'border-color 0.15s, background 0.15s'\n        },\n        hoverStyle: {\n          borderColor: sel ? '#0066CC' : 'rgba(0,102,204,0.4)',\n          background: sel ? 'rgba(0,102,204,0.1)' : 'rgba(0,102,204,0.03)'\n        },\n        dotStyle: {\n          width: '18px', height: '18px', borderRadius: '50%', flexShrink: 0,\n          border: sel ? '5px solid #0066CC' : '2px solid rgba(255,255,255,0.22)',\n          transition: 'border 0.15s'\n        },\n        onClick: () => {\n          const newAnswers = Object.assign({}, this.state.answers, { [key]: opt.value });\n          this.setState({ answers: newAnswers });\n          setTimeout(() => {\n            if (nextScreen === 'form_or_rejected') {\n              const qualified = true;\n              this.setState({ screen: qualified ? 'form' : 'rejected' });\n            } else {\n              this.setState({ screen: nextScreen });\n            }\n          }, 320);\n        }\n      };\n    });\n  }\n\n  renderVals() {\n    const { screen, answers, form, formError } = this.state;\n\n    const isQ1       = screen === 'q1';\n    const isQ2       = screen === 'q2';\n    const isQ3       = screen === 'q3';\n    const isForm     = screen === 'form';\n    const isRejected = screen === 'rejected';\n    const isThanks   = screen === 'thanks';\n\n    const q1Options = this._makeOptions([\n      { value: '1000-2999', label: '$1,000 – $2,999 USD / mes' },\n      { value: '3000-5000', label: '$3,000 – $5,000 USD / mes' },\n      { value: '5000-10000',label: '$5,000 – $10,000 USD / mes' },\n      { value: 'over10000', label: 'Más de $10,000 USD / mes' }\n    ], 'budget', 'q2', false);\n\n    const q2Options = this._makeOptions([\n      { value: 'food',         label: 'Restaurante / Alimentos' },\n      { value: 'construction', label: 'Construcción / Contratista' },\n      { value: 'health',       label: 'Salud / Clínica' },\n      { value: 'realestate',   label: 'Bienes Raíces' },\n      { value: 'retail',       label: 'Retail / Comercio' },\n      { value: 'professional', label: 'Servicios Profesionales' },\n      { value: 'ecommerce',    label: 'E-commerce / Online' },\n      { value: 'other',        label: 'Otro' }\n    ], 'industry', 'q3', true);\n\n    const q3Options = this._makeOptions([\n      { value: 'under1', label: 'Menos de 1 año' },\n      { value: '1-3',    label: '1 – 3 años' },\n      { value: '3-5',    label: '3 – 5 años' },\n      { value: 'over5',  label: 'Más de 5 años' }\n    ], 'years', 'form_or_rejected', false);\n\n    const goBack = () => {\n      const prev = { q2: 'q1', q3: 'q2', form: 'q3', rejected: 'q3' };\n      const s = this.state.screen;\n      if (prev[s]) this.setState({ screen: prev[s] });\n    };\n\n    const set = (f) => (e) => this.setState({\n      form: Object.assign({}, this.state.form, { [f]: e.target.value }),\n      formError: ''\n    });\n\n    const onNameChange     = set('name');\n    const onEmailChange    = set('email');\n    const onPhoneChange    = set('phone');\n    const onCityChange     = set('city');\n    const onBusinessChange = set('business');\n    const onIndustryChange = set('industry');\n    const onBudgetChange   = set('budget');\n\n    const submitForm = () => {\n      if (!form.name.trim() || !form.email.trim() || !form.phone.trim()) {\n        this.setState({ formError: 'Por favor completa los campos requeridos (*).' });\n        return;\n      }\n      if (!/^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(form.email)) {\n        this.setState({ formError: 'Por favor ingresa un email válido.' });\n        return;\n      }\n      // Enviar datos por email via FormSubmit\n      const { answers } = this.state;\n      const payload = new FormData();\n      payload.append('_subject', 'Nuevo lead Agency Smart MX — ' + form.name);\n      payload.append('_template', 'table');\n      payload.append('_captcha', 'false');\n      payload.append('Nombre', form.name);\n      payload.append('Email', form.email);\n      payload.append('WhatsApp', form.phone);\n      payload.append('Ciudad', form.city || '—');\n      payload.append('Negocio', form.business || '—');\n      payload.append('Giro', form.industry || '—');\n      payload.append('Presupuesto_form', form.budget || '—');\n      payload.append('Presupuesto_quiz', answers.budget || '—');\n      payload.append('Plataformas', (answers.platforms || []).join(', ') || '—');\n      payload.append('Objetivo', answers.goal || '—');\n      fetch('https://formsubmit.co/agencysmartdigital@gmail.com', { method: 'POST', body: payload })\n        .catch(() => {}); // silencioso — no bloquear si falla\n      this.setState({ screen: 'thanks' });\n    };\n\n    return {\n      isQ1, isQ2, isQ3, isForm, isRejected, isThanks,\n      q1Options, q2Options, q3Options,\n      goBack,\n      form, onNameChange, onEmailChange, onPhoneChange, onCityChange,\n      onBusinessChange, onIndustryChange, onBudgetChange,\n      submitForm, formError\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
